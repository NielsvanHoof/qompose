version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Composer and npm live in the platform app, not the repo root.
  - package-ecosystem: "composer"
    directory: "/apps/platform"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5

  - package-ecosystem: "npm"
    directory: "/apps/platform"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
