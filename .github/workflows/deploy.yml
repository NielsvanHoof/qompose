name: Deploy OCR infra

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-ocr-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production OCR stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      PULUMI_BACKEND_URL: ${{ vars.PULUMI_BACKEND_URL || 'https://api.pulumi.com' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Configure AWS workload identity
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infrastructure dependencies
        working-directory: apps/platform/infra
        run: npm ci

      - name: Select Pulumi stack
        working-directory: apps/platform/infra
        run: |
          npx pulumi login "$PULUMI_BACKEND_URL"
          if ! npx pulumi stack select production --non-interactive; then
            npx pulumi stack init production --non-interactive
          fi

      - name: Configure and deploy
        working-directory: apps/platform/infra
        run: |
          npx pulumi config set aws:region "$AWS_REGION"
          if [ -n "${{ vars.ALARM_EMAIL_ADDRESS }}" ]; then
            npx pulumi config set alarmEmailAddress "${{ vars.ALARM_EMAIL_ADDRESS }}"
          else
            npx pulumi config rm alarmEmailAddress || true
          fi
          npm run up -- --yes --non-interactive
      - name: Report outputs
        working-directory: apps/platform/infra
        run: |
          {
            echo "### OCR stack outputs"
            echo ""
            echo "- Bucket: \`$(npx pulumi stack output documentsBucketName)\`"
            echo "- Results queue: \`$(npx pulumi stack output textractResultsQueueUrl)\`"
            echo "- OCR user: \`$(npx pulumi stack output ocrLocalUserName)\`"
          } >> "$GITHUB_STEP_SUMMARY"
