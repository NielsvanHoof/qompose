name: Platform CI

on:
  pull_request:
    paths:
      - "apps/platform/**"
      - ".github/workflows/platform.yml"
  push:
    branches:
      - main
    paths:
      - "apps/platform/**"
      - ".github/workflows/platform.yml"

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/platform

env:
  PHP_VERSION: "8.5"
  NODE_VERSION: "24"

jobs:
  quality:
    name: Application quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, intl, mbstring, pcntl, pdo_pgsql, redis, sqlite3, zip
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/platform/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare the application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Run the complete quality gate
        run: composer ci:check

  postgres-migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: testing
      APP_KEY: base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      CACHE_STORE: array
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_DATABASE: qompose_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MAIL_MAILER: array
      OCR_DRIVER: mock
      QUEUE_CONNECTION: sync
      SCOUT_DRIVER: collection
      SESSION_DRIVER: array

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: qompose_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qompose_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, intl, mbstring, pcntl, pdo_pgsql, zip
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Test clean PostgreSQL migrations
        run: php artisan migrate:fresh --force --no-interaction

      - name: Test the latest migration rollback
        run: |
          php artisan migrate:rollback --step=1 --force --no-interaction
          php artisan migrate --force --no-interaction
          php artisan migrate:status --no-interaction

  deployment-artifact:
    name: Immutable deployment artifact
    needs:
      - quality
      - postgres-migrations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the production image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: apps/platform
          file: apps/platform/Dockerfile.production
          platforms: linux/amd64
          build-args: |
            REVERB_PUBLIC_KEY=ci-${{ env.SOURCE_SHA }}
            VITE_REVERB_HOST=ci.invalid
          labels: |
            org.opencontainers.image.revision=${{ env.SOURCE_SHA }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          outputs: type=oci,dest=${{ runner.temp }}/qompose-production-${{ env.SOURCE_SHA }}.tar
          cache-from: type=gha,scope=platform-production-image
          cache-to: type=gha,mode=max,scope=platform-production-image
          provenance: mode=max
          sbom: true

      - name: Upload immutable production image
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/qompose-production-${{ env.SOURCE_SHA }}.tar
          archive: false
          if-no-files-found: error
          retention-days: 7

      - name: Report artifact identity
        run: |
          echo "### Immutable production image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source commit: \`${SOURCE_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- OCI digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact digest: \`${{ steps.upload.outputs.artifact-digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download: ${{ steps.upload.outputs.artifact-url }}" >> "$GITHUB_STEP_SUMMARY"
