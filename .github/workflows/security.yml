name: security

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - 'apps/platform/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - 'apps/platform/**'
      - '.github/workflows/security.yml'

permissions:
  contents: read

defaults:
  run:
    # Platform app lives under apps/ in the monorepo.
    working-directory: apps/platform

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Audit Dependencies
        run: composer security:check
