name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - 'apps/platform/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
    paths:
      - 'apps/platform/**'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

defaults:
  run:
    # Platform app lives under apps/ in the monorepo.
    working-directory: apps/platform

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@7 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@2# v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@6 # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Tests
        run: php artisan test
